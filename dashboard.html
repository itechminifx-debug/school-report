<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SalesPro | Dashboard</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --card: #ffffff;
            --primary: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); min-height: 100vh; }
        
        .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 240px; background: #1e293b; color: white; padding: 25px 20px; z-index: 100; }
        .sidebar .logo { font-size: 22px; font-weight: 700; margin-bottom: 35px; }
        .sidebar .logo span { color: #818cf8; }
        .sidebar nav a { display: flex; align-items: center; gap: 10px; color: #94a3b8; text-decoration: none; padding: 10px 12px; border-radius: 8px; margin-bottom: 4px; font-size: 14px; transition: all 0.2s; }
        .sidebar nav a:hover, .sidebar nav a.active { background: rgba(255,255,255,0.08); color: white; }
        
        .main-content { margin-left: 240px; padding: 25px; }
        .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .topbar h1 { font-size: 24px; color: var(--text); }
        .topbar .user-badge { display: flex; align-items: center; gap: 10px; background: var(--card); padding: 8px 16px; border-radius: 50px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); font-size: 14px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 18px; margin-bottom: 25px; }
        .stat-card { background: var(--card); border-radius: 16px; padding: 22px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); position: relative; overflow: hidden; }
        .stat-card .icon { position: absolute; right: 15px; top: 15px; font-size: 36px; opacity: 0.15; }
        .stat-card .value { font-size: 30px; font-weight: 700; color: var(--text); }
        .stat-card .label { font-size: 12px; color: var(--text-light); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card.accent { border-left: 4px solid var(--primary); }
        .stat-card.success { border-left: 4px solid var(--success); }
        .stat-card.warning { border-left: 4px solid var(--warning); }
        .stat-card.danger { border-left: 4px solid var(--danger); }
        
        .panel { background: var(--card); border-radius: 16px; padding: 22px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); margin-bottom: 25px; }
        .panel h3 { font-size: 16px; color: var(--text); margin-bottom: 18px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        table th { background: #f8fafc; color: var(--text-light); padding: 12px 10px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid var(--border); }
        table td { padding: 10px; border-bottom: 1px solid var(--border); color: var(--text); }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-paid { background: #d1fae5; color: #065f46; }
        .badge-pending { background: #fef3c7; color: #92400e; }
        
        .btn { padding: 10px 18px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; transition: all 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #4338ca; }
        
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">Sales<span>Pro</span></div>
        <nav>
            <a href="dashboard.html" class="active">📊 Dashboard</a>
            <a href="add_sale.html">💰 New Sale</a>
            <a href="#">👥 Customers</a>
            <a href="#">📦 Products</a>
            <a href="#">📈 Reports</a>
            <a href="index.html">🚪 Logout</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="topbar">
            <h1>Dashboard Overview</h1>
            <div class="user-badge">👤 <span id="userDisplay">Admin</span></div>
        </div>

        <div class="stats-grid">
            <div class="stat-card accent"><div class="icon">💰</div><div class="value" id="totalSales">GHS 0</div><div class="label">Total Sales</div></div>
            <div class="stat-card success"><div class="icon">👥</div><div class="value" id="totalCustomers">0</div><div class="label">Customers</div></div>
            <div class="stat-card warning"><div class="icon">📅</div><div class="value" id="todaySales">GHS 0</div><div class="label">Today</div></div>
            <div class="stat-card danger"><div class="icon">⏳</div><div class="value" id="pendingPayments">GHS 0</div><div class="label">Pending</div></div>
        </div>

        <div class="panel">
            <h3>Recent Transactions</h3>
            <table>
                <thead><tr><th>Date</th><th>Customer</th><th>Product</th><th>Amount</th><th>Status</th></tr></thead>
                <tbody id="recentTransactions"><tr><td colspan="5" style="text-align:center;color:#999;">No transactions yet</td></tr></tbody>
            </table>
        </div>
    </div>

    <script>
        window.onload = function() {
            document.getElementById('userDisplay').textContent = sessionStorage.getItem('salesUser') || 'Admin';
            var sales = JSON.parse(localStorage.getItem('sales_data')) || [];
            var total = sales.reduce(function(s, i) { return s + i.amount; }, 0);
            document.getElementById('totalSales').textContent = 'GHS ' + total.toLocaleString();
            var customers = [...new Set(sales.map(function(s) { return s.customer; }))];
            document.getElementById('totalCustomers').textContent = customers.length;
            var today = new Date().toLocaleDateString();
            var todayTotal = sales.filter(function(s) { return s.date === today; }).reduce(function(s, i) { return s + i.amount; }, 0);
            document.getElementById('todaySales').textContent = 'GHS ' + todayTotal.toLocaleString();
            var pending = sales.filter(function(s) { return s.status === 'Pending'; }).reduce(function(s, i) { return s + i.amount; }, 0);
            document.getElementById('pendingPayments').textContent = 'GHS ' + pending.toLocaleString();
            var recent = sales.slice(-5).reverse();
            var tbody = document.getElementById('recentTransactions');
            if (recent.length > 0) {
                var html = '';
                recent.forEach(function(s) {
                    html += '<tr><td>' + s.date + '</td><td>' + s.customer + '</td><td>' + s.product + '</td><td>GHS ' + s.amount + '</td><td><span class="badge ' + (s.status === 'Paid' ? 'badge-paid' : 'badge-pending') + '">' + s.status + '</span></td></tr>';
                });
                tbody.innerHTML = html;
            }
        };
    </script>
</body>
</html>
